<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Greeting Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js" defer></script>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" defer></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="ambient-bg" aria-hidden="true"></div>

  <header class="topbar">
    <h1>Eid Greeting Generator</h1>
    <p>Create share-ready Eid cards with your own photos, greetings, and animation.</p>
  </header>

  <main class="app-layout">
    <section class="panel controls-panel" aria-label="Controls">
      <h2>Customize</h2>

      <label class="field">
        <span>Upload Photos (1-3)</span>
        <input id="photoUpload" type="file" accept="image/*" multiple />
      </label>
      <div id="uploadList" class="upload-list" aria-live="polite"></div>

      <label class="field">
        <span>Sender Name</span>
        <input id="senderName" type="text" maxlength="80" placeholder="From Mufassir & Family" value="From Your Family" />
      </label>

      <div class="field">
        <span>Template</span>
        <div id="templateGrid" class="template-grid" role="listbox" aria-label="Background templates"></div>
      </div>

      <label class="field">
        <span>Photo Layout</span>
        <select id="layoutSelect">
          <option value="classic">Classic Circle</option>
          <option value="ribbon">Ribbon Strip</option>
          <option value="collage">Collage Mix</option>
        </select>
      </label>

      <fieldset class="field mode-group">
        <legend>Greeting Mode</legend>
        <label><input type="radio" name="greetingMode" value="random" checked /> Random</label>
        <label><input type="radio" name="greetingMode" value="default" /> Default</label>
        <label><input type="radio" name="greetingMode" value="custom" /> Custom</label>
      </fieldset>

      <label class="field">
        <span>Default Greeting</span>
        <select id="defaultGreeting" disabled></select>
      </label>

      <label class="field">
        <span>Custom Greeting</span>
        <textarea id="customGreeting" rows="3" maxlength="220" placeholder="Write your own Eid wish here..." disabled></textarea>
      </label>

      <label class="field">
        <span>Animation Style</span>
        <select id="animationSelect">
          <option value="fade">Fade In</option>
          <option value="zoom">Zoom In</option>
          <option value="slide">Slide Up</option>
        </select>
      </label>

      <label class="field">
        <span>Background Audio (Optional)</span>
        <select id="audioSelect"></select>
      </label>

      <audio id="audioPreview" controls preload="none"></audio>

      <div class="button-row">
        <button id="surpriseBtn" class="btn secondary" type="button">Surprise Me</button>
        <button id="generateBtn" class="btn primary" type="button">Generate</button>
      </div>

      <div class="button-row">
        <button id="downloadPngBtn" class="btn" type="button" disabled>Download PNG</button>
        <button id="downloadGifBtn" class="btn" type="button" disabled>Download GIF</button>
      </div>

      <button id="downloadVideoBtn" class="btn" type="button" disabled>Download MP4</button>

      <p id="statusMsg" class="status">Ready. Upload photos and click Generate.</p>
    </section>

    <section class="panel preview-panel" aria-label="Preview">
      <h2>Preview</h2>
      <div class="canvas-shell">
        <canvas id="greetingCanvas" width="1080" height="1080" aria-label="Generated Eid greeting"></canvas>
      </div>
      <p class="hint">1080 x 1080 output, ideal for WhatsApp and social posts.</p>
    </section>
  </main>
</body>
</html>
